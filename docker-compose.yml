services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      MEMORY_BACKEND: redis
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis

volumes:
  redisdata:
